<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bąbelkowy Ogród Finansowy Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .white-glow-bg { background: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 50%, #f0fdf4 100%); }
    </style>
</head>
<body class="white-glow-bg min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="bg-white/80 backdrop-blur-2xl w-full max-w-md h-[880px] rounded-[42px] shadow-2xl border-8 border-white overflow-hidden flex flex-col relative">
        
        <!-- Header -->
        <header class="bg-gradient-to-r from-cyan-400 to-emerald-500 p-5 flex justify-between items-center text-white">
            <h1 class="font-black text-base">🫧 BĄBELKOWY OGRÓD</h1>
            <button id="logout-btn" onclick="logout()" class="hidden bg-white/20 text-[10px] px-3 py-1 rounded-full font-bold">Wyloguj</button>
        </header>

        <!-- Auth Panel -->
        <div id="auth-panel" class="flex-1 flex flex-col justify-center px-8">
            <h2 class="text-2xl font-black mb-6" id="auth-title">Zaloguj się</h2>
            <input type="email" id="email" placeholder="E-mail" class="w-full p-3 mb-3 rounded-xl border border-slate-200">
            <input type="password" id="password" placeholder="Hasło" class="w-full p-3 mb-4 rounded-xl border border-slate-200">
            <button onclick="handleAuth()" id="auth-btn" class="w-full bg-emerald-500 text-white font-black py-4 rounded-xl">Zaloguj / Rejestruj</button>
        </div>

        <!-- Main App (ukryte do czasu logowania) -->
        <div id="app-view" class="hidden flex-1 flex flex-col overflow-y-auto p-5 space-y-6">
            <div class="bg-white p-6 rounded-3xl border border-cyan-100 shadow-sm">
                <p class="text-[10px] uppercase font-bold text-slate-400">Wolne Środki</p>
                <h3 class="text-4xl font-black"><span id="display-balance">0.00</span> €</h3>
                <button onclick="openAtm()" class="mt-4 w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Wpłać/Wypłać</button>
            </div>

            <div id="water-status" class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                <p class="font-bold text-blue-800 text-sm">💧 Woda: <span id="water-count">0</span> L</p>
            </div>

            <div class="grid grid-cols-2 gap-4" id="garden-grid">
                <!-- Sloty ogrodu generowane przez JS -->
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        function saveDB(db) { localStorage.setItem('bubbleGardenDB', JSON.stringify(db)); }
        function getDB() { return JSON.parse(localStorage.getItem('bubbleGardenDB') || '{}'); }

        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            let db = getDB();

            if (!db[email]) {
                db[email] = { password: pass, balance: 0, water: 0, garden: [null, null, null, null] };
                saveDB(db);
                alert("Zarejestrowano!");
            }
            
            if (db[email].password === pass) {
                currentUser = email;
                document.getElementById('auth-panel').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                updateUI();
            } else {
                alert("Błędne hasło!");
            }
        }

        function updateUI() {
            let db = getDB();
            let user = db[currentUser];
            document.getElementById('display-balance').innerText = user.balance.toFixed(2);
            document.getElementById('water-count').innerText = user.water;
            
            const grid = document.getElementById('garden-grid');
            grid.innerHTML = '';
            user.garden.forEach((plant, i) => {
                grid.innerHTML += `
                    <div onclick="interactGarden(${i})" class="bg-white border rounded-3xl p-4 h-32 flex flex-col items-center justify-center cursor-pointer">
                        <span class="text-3xl">${plant ? '🌱' : '🟤'}</span>
                        <p class="text-[10px] font-bold mt-2">${plant ? 'Podlej!' : 'Posadź'}</p>
                    </div>
                `;
            });
        }

        function interactGarden(i) {
            let db = getDB();
            let user = db[currentUser];
            if (!user.garden[i]) {
                user.garden[i] = { type: 'roślina', progress: 0 };
            } else if (user.water > 0) {
                user.water -= 1;
                user.garden[i].progress += 25;
            } else {
                alert("Brak wody! Wpłać środki, aby zdobyć wodę.");
                return;
            }
            saveDB(db);
            updateUI();
        }

        function openAtm() {
            let amount = parseFloat(prompt("Ile Euro chcesz wpłacić?", "10"));
            if (amount > 0) {
                let db = getDB();
                db[currentUser].balance += amount;
                db[currentUser].water += Math.floor(amount / 5); // 1L wody za każde 5 Euro
                saveDB(db);
                updateUI();
            }
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
