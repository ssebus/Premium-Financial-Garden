<html lang="pl">
<head>
<meta charset="UTF-8">

<style>
html,body{
height:100%;
margin:0;
overflow:hidden;
font-family:sans-serif;
touch-action:none;
}

body{
background:linear-gradient(135deg,#e0f2fe 0%,#f8fafc 50%,#f0fdf4 100%);
background-size:200% 200%;
animation:bgMove 12s ease infinite;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
position: relative;
user-select: none;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.app{
width:100%;
max-width:430px;
height:96vh;
background:rgba(255,255,255,.88);
backdrop-filter:blur(20px);
border-radius:38px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 25px 60px rgba(0,0,0,.12);
border:1px solid rgba(255,255,255,.7);
position:relative;
}

.scroll{
flex:1;
overflow-y:auto;
padding:16px;
-webkit-overflow-scrolling:touch;
}

.topbar{
background:linear-gradient(90deg,#22d3ee,#10b981);
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
z-index: 10;
}

.title{
font-weight:900;
font-size:14px;
}

.notification-container {
position: absolute;
top: 75px;
left: 16px;
right: 16px;
z-index: 9999;
display: flex;
flex-direction: column;
gap: 10px;
pointer-events: none;
}

.in-app-toast {
background: white;
border-radius: 20px;
padding: 14px 18px;
box-shadow: 0 15px 35px rgba(15,23,42,0.15);
border: 1px solid #e2e8f0;
display: flex;
gap: 12px;
align-items: center;
transform: translateY(-40px);
opacity: 0;
transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
pointer-events: auto;
cursor: pointer;
}

.in-app-toast.show {
transform: translateY(0);
opacity: 1;
}

.balanceCard{
background:white;
border-radius:28px;
padding:20px;
border:2px solid #cffafe;
box-shadow:0 0 25px rgba(34,211,238,.18);
}

.goalCard{
background:white;
border-radius:28px;
padding:18px;
position:relative;
overflow:hidden;
border:1px solid #e2e8f0;
}

.wave{
position:absolute;
width:220%;
height:220%;
left:-60%;
border-radius:40%;
animation:waveRotate 10s linear infinite;
}

@keyframes waveRotate{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.bubble{
position:absolute;
border-radius:999px;
animation:bubbleUp linear infinite;
opacity:.8;
}

@keyframes bubbleUp{
0%{transform:translateY(0) scale(.5);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-170px) scale(1.5);opacity:0;}
}

.slot{
background:white;
border-radius:24px;
padding:14px;
height:180px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
border:1px solid #e2e8f0;
transition:.2s;
}

.slot:active{transform:scale(.97);}

.modal{
position:absolute;
inset:0;
background:rgba(0,0,0,.4);
backdrop-filter:blur(5px);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:100;
}

.modalBox{
background:white;
width:100%;
border-radius:28px;
padding:20px;
max-height:90vh;
overflow-y:auto;
}

input,select{
width:100%;
padding:14px;
border-radius:16px;
border:1px solid #cbd5e1;
background:#f8fafc;
font-weight:700;
outline:none;
}

.mainBtn{
padding:14px;
border-radius:18px;
font-weight:900;
border:none;
cursor:pointer;
}

.histItem{
background:white;
border-radius:18px;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e2e8f0;
}

.tab-btn {
flex: 1;
padding: 10px;
font-weight: 800;
font-size: 11px;
border-radius: 12px;
background: #f1f5f9;
color: #64748b;
border: none;
cursor: pointer;
text-transform: uppercase;
display: flex;
align-items: center;
justify-content: center;
gap: 4px;
}

.tab-btn.active {
background: #06b6d4;
color: white;
}

/* STYLE BANKOMATU */
.atm-machine {
background: linear-gradient(180deg, #0f172a, #1e293b, #334155);
border-radius: 28px;
padding: 24px;
color: white;
text-align: center;
position: relative;
border: 5px solid #475569;
box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 15px 30px rgba(0,0,0,0.3);
}

.atm-screen {
background: #020617;
border: 2px solid #334155;
border-radius: 12px;
padding: 10px;
font-family: monospace;
color: #38bdf8;
font-size: 11px;
margin-bottom: 15px;
box-shadow: inset 0 0 10px rgba(56,189,248,0.2);
}

.atm-slot {
background: #020617;
height: 34px;
border-radius: 6px;
margin: 20px auto;
width: 85%;
border: 2px solid #06b6d4;
box-shadow: 0 0 15px rgba(6,182,212,0.6);
position: relative;
transition: all 0.2s;
display: flex;
justify-content: center;
align-items: center;
}

.atm-slot.pulse {
animation: slotGlow 1.2s ease-in-out infinite alternate;
}

@keyframes slotGlow {
0% { border-color: #06b6d4; box-shadow: 0 0 5px rgba(6,182,212,0.4); }
100% { border-color: #10b981; box-shadow: 0 0 25px rgba(16,185,129,0.9); }
}

.money-dispenser {
height: 180px;
position: relative;
background: rgba(0,0,0,0.2);
border-radius: 20px;
border: 2px dashed rgba(255,255,255,0.1);
display: flex;
justify-content: center;
align-items: center;
overflow: visible;
margin-top: 10px;
}

.draggable-money {
cursor: grab;
position: absolute;
z-index: 50;
user-select: none;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
touch-action: none;
will-change: transform;
}
.draggable-money:active { cursor: grabbing; }

.real-bill {
width: 150px;
height: 75px;
border-radius: 6px;
position: relative;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
border: 3px double rgba(255,255,255,0.6);
box-shadow: 0 6px 12px rgba(0,0,0,0.4), inset 0 0 10px rgba(0,0,0,0.15);
color: white;
font-family: 'Georgia', serif;
font-weight: bold;
text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

.real-bill::before {
content: "";
position: absolute;
inset: 4px;
border: 1px solid rgba(255,255,255,0.3);
border-radius: 3px;
pointer-events: none;
}

.bill-center-value {
font-size: 22px;
letter-spacing: 1px;
z-index: 2;
}

.bill-bottom-text {
font-size: 9px;
font-family: sans-serif;
opacity: 0.9;
margin-top: 1px;
background: rgba(0,0,0,0.2);
padding: 1px 6px;
border-radius: 6px;
text-transform: uppercase;
letter-spacing: 0.5px;
z-index: 2;
}

.real-coin {
width: 70px;
height: 70px;
border-radius: 999px;
background: linear-gradient(135deg, #fcd34d, #f59e0b, #d97706);
border: 3px solid #b45309;
box-shadow: 0 5px 10px rgba(0,0,0,0.4), inset -3px -3px 6px rgba(0,0,0,0.4), inset 3px 3px 6px rgba(255,255,255,0.4);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
color: #78350f;
font-weight: 900;
position: relative;
}

.real-coin.silver {
background: linear-gradient(135deg, #e2e8f0, #cbd5e1, #94a3b8);
border: 3px solid #64748b;
color: #334155;
}

.coin-value {
font-size: 18px;
line-height: 1;
}

.coin-unit {
font-size: 9px;
text-transform: uppercase;
font-weight: 800;
}

@keyframes printMoney {
0% { transform: translateY(40px) scale(0.2); opacity: 0; }
100% { transform: translateY(0) scale(1); opacity: 1; }
}

@keyframes autoFlyToSlot {
0% { transform: translate(0, 0) scale(1); opacity: 1; }
100% { transform: translate(0, -110px) scale(0.1); opacity: 0; }
}

@keyframes autoFlyFromSlot {
0% { transform: translate(0, 0) scale(1); opacity: 1; }
100% { transform: translate(0, 110px) scale(1); opacity: 0; }
}

.printed-money {
animation: printMoney 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

.auto-flying {
animation: autoFlyToSlot 0.3s ease-in forwards !important;
}

.auto-flying-from {
animation: autoFlyFromSlot 0.3s ease-in forwards !important;
}
</style>
</head>
