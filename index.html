<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bąbelkowy Ogród Finansowy Pro</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        .white-glow-bg {
            background: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 50%, #f0fdf4 100%);
            background-size: 200% 200%;
            animation: lightShine 12s ease infinite;
        }

        @keyframes lightShine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes wave-turn {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .wave-effect {
            animation: wave-turn 7s linear infinite;
        }

        @keyframes bubble-rise {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }

            15% {
                opacity: 0.8;
            }

            85% {
                opacity: 0.4;
            }

            100% {
                transform: translateY(-180px) scale(1.3);
                opacity: 0;
            }
        }

        .bubble {
            animation: bubble-rise infinite linear;
        }

        @keyframes insert-bill {
            0% {
                bottom: -70px;
                transform: scale(1) translateX(40px);
                opacity: 1;
            }

            100% {
                bottom: 60px;
                transform: scale(0.1) translateX(40px);
                opacity: 0;
            }
        }

        @keyframes eject-bill {
            0% {
                bottom: 60px;
                transform: scale(0.1) translateX(40px);
                opacity: 0;
            }

            100% {
                bottom: -20px;
                transform: scale(1) translateX(40px);
                opacity: 1;
            }
        }

        @keyframes insert-coin {
            0% {
                top: -40px;
                transform: translateX(-60px) scale(1);
                opacity: 1;
            }

            50% {
                top: 30px;
                transform: translateX(-60px) scale(1.1);
            }

            100% {
                top: 120px;
                transform: translateX(-60px) scale(0.2);
                opacity: 0;
            }
        }

        @keyframes eject-coin {
            0% {
                top: 30px;
                transform: translateX(-60px) scale(0);
                opacity: 0;
            }

            100% {
                top: 115px;
                transform: translateX(-60px) scale(1);
                opacity: 1;
            }
        }

        .anim-bill-in {
            animation: insert-bill 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .anim-bill-out {
            animation: eject-bill 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .anim-coin-in {
            animation: insert-coin 1.1s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
        }

        .anim-coin-out {
            animation: eject-coin 1.1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .neon-glow-cyan {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.35);
        }

        .neon-glow-emerald {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.45);
        }
    </style>
</head>

<body class="white-glow-bg min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

<div class="bg-white/80 backdrop-blur-2xl w-full max-w-md h-[880px] rounded-[42px] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.1)] border-8 border-white overflow-hidden flex flex-col relative">

    <header class="bg-gradient-to-r from-cyan-400 to-emerald-500 p-5 flex justify-between items-center border-b border-white/40 shadow-sm text-white relative z-30">

        <div class="flex items-center gap-3">

            <button id="menu-trigger"
                    onclick="toggleSidebar(true)"
                    class="hidden text-2xl hover:opacity-80 transition cursor-pointer">
                ☰
            </button>

            <div>
                <h1 class="font-black text-base tracking-tight drop-shadow-sm"
                    id="lng-app-title">
                    🫧 BĄBELKOWY OGRÓD
                </h1>

                <p class="text-[10px] text-emerald-50 italic font-medium">
                    ✨ Premium System
                </p>
            </div>
        </div>

        <div class="flex items-center gap-2">

            <select id="language-selector"
                    onchange="changeSystemLanguage(this.value)"
                    class="bg-white/20 border border-white/30 text-white font-bold text-xs p-1.5 rounded-lg focus:outline-none cursor-pointer">

                <option value="pl" class="text-slate-800">🇵🇱 PL</option>
                <option value="en" class="text-slate-800">🇬🇧 EN</option>
                <option value="de" class="text-slate-800">🇩🇪 DE</option>

            </select>

            <button id="logout-trigger"
                    onclick="runLogout()"
                    class="hidden bg-white/25 hover:bg-white/40 border border-white/30 text-[10px] px-2 py-1.5 rounded-full font-bold transition whitespace-nowrap">

                Wysuń kartę

            </button>

        </div>

    </header>

    <div id="sidebar-menu"
         class="absolute inset-y-0 left-0 w-64 bg-white shadow-2xl border-r border-slate-100 z-50 transform -translate-x-full transition-transform duration-300 flex flex-col">

        <div class="p-5 border-b border-slate-100 bg-gradient-to-r from-slate-50 to-slate-100 flex justify-between items-center">

            <span class="font-black text-slate-700 text-xs tracking-wider"
                  id="lng-side-title">
                🌾 MENU APLIKACJI
            </span>

            <button onclick="toggleSidebar(false)"
                    class="text-slate-400 text-lg font-bold p-1 hover:text-slate-600">
                ✕
            </button>

        </div>

        <div class="p-4 space-y-2 flex-1">

            <button onclick="switchView('main')"
                    class="w-full text-left font-bold text-slate-700 p-3 rounded-xl hover:bg-cyan-50 hover:text-cyan-600 transition flex items-center gap-2.5">

                <span>🫧</span>
                <span id="lng-side-main">Skarbonka (Cele)</span>

            </button>

            <button onclick="switchView('garden')"
                    class="w-full text-left font-bold text-slate-700 p-3 rounded-xl hover:bg-emerald-50 hover:text-emerald-600 transition flex items-center gap-2.5">

                <span>🏡</span>
                <span id="lng-side-garden">Twój Ogród</span>

            </button>

            <button onclick="switchView('history')"
                    class="w-full text-left font-bold text-slate-700 p-3 rounded-xl hover:bg-slate-50 hover:text-slate-600 transition flex items-center gap-2.5">

                <span>📊</span>
                <span id="lng-side-history">Rejestr Wpłat/Wypłat</span>

            </button>

        </div>

        <div class="p-5 border-t border-slate-100 text-center bg-slate-50">

            <p id="sidebar-user"
               class="text-xs font-mono text-slate-400 truncate"></p>

        </div>

    </div>

    <div id="sidebar-overlay"
         onclick="toggleSidebar(false)"
         class="absolute inset-0 bg-black/20 hidden z-40"></div>

    <!-- LOGIN -->

    <div id="auth-panel"
         class="flex-1 flex flex-col justify-center px-8 bg-white/40">

        <div class="text-center mb-8">

            <div class="inline-block p-4 bg-emerald-100 text-emerald-500 rounded-full mb-3 shadow-inner">
                <span class="text-4xl">🧑‍🌾</span>
            </div>

            <h2 class="text-2xl font-black tracking-tight text-slate-800"
                id="lng-auth-header">

                Otwórz Portfel i Ogród €

            </h2>

            <p class="text-xs text-slate-500 mt-1"
               id="lng-auth-lead">

                Zarządzaj finansami i uprawiaj rośliny

            </p>

        </div>

        <form onsubmit="executeAuth(event)"
              class="space-y-4">

            <div>

                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">
                    E-mail
                </label>

                <input type="email"
                       id="user-email"
                       required
                       placeholder="user@domain.com"
                       class="w-full px-4 py-3 rounded-xl bg-white border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-400 text-slate-800 text-sm shadow-sm">

            </div>

            <div>

                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">
                    Hasło
                </label>

                <input type="password"
                       id="user-password"
                       required
                       placeholder="••••••••"
                       class="w-full px-4 py-3 rounded-xl bg-white border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-400 text-slate-800 text-sm shadow-sm">

            </div>

            <button type="submit"
                    class="w-full bg-gradient-to-r from-emerald-400 to-cyan-500 hover:from-emerald-500 hover:to-cyan-600 text-white font-black py-4 rounded-xl shadow-lg transition cursor-pointer text-sm uppercase tracking-wider">

                Uruchom System 💳

            </button>

        </form>

    </div>

    <!-- MAIN -->

    <div id="view-main"
         class="hidden flex-1 flex flex-col overflow-y-auto p-5 space-y-6">

        <div class="bg-white border-2 border-cyan-100 p-5 rounded-3xl shadow-sm relative overflow-hidden neon-glow-cyan">

            <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">
                Wolne Środki
            </p>

            <h3 class="text-4xl font-black mt-1 text-slate-800 font-mono">
                <span id="display-balance">0.00</span> €
            </h3>

            <button onclick="launchAtm()"
                    class="mt-4 w-full bg-slate-900 hover:bg-slate-800 text-white text-xs font-black py-3.5 rounded-xl shadow-md transition flex justify-center items-center gap-2 cursor-pointer uppercase tracking-wider">

                🎰 Uruchom Maszynę Wpłat/Wypłat €

            </button>

        </div>

        <div class="space-y-4">

            <div class="flex justify-between items-center">

                <h4 class="font-black text-slate-700 text-xs tracking-widest uppercase">
                    Twoje Kółka Oszczędnościowe
                </h4>

                <button onclick="showNewGoalForm()"
                        class="text-xs font-bold bg-cyan-100 hover:bg-cyan-200 text-cyan-700 px-3 py-1.5 rounded-full transition shadow-sm">

                    + Nowy Cel

                </button>

            </div>

            <div id="goals-list-box"
                 class="space-y-4">

                <div id="empty-goals-msg"
                     class="text-center py-10 text-slate-400 text-xs italic bg-white rounded-2xl border border-dashed border-slate-200">

                    Twoje konto jest czyste.

                </div>

            </div>

        </div>

    </div>

    <!-- HISTORY -->

    <div id="view-history"
         class="hidden flex-1 flex flex-col p-5 overflow-y-auto">

        <h3 class="font-black text-slate-700 text-sm tracking-widest uppercase mb-4">
            📊 Historia Operacji
        </h3>

        <div id="history-list"
             class="space-y-2 flex-1">

        </div>

    </div>

    <!-- ATM -->

    <div id="atm-modal"
         class="absolute inset-x-0 bottom-0 top-0 bg-slate-900/40 backdrop-blur-md hidden z-50 flex flex-col justify-end">

        <div class="bg-white border-t-4 border-cyan-400 rounded-t-[38px] p-6 space-y-4 shadow-2xl max-h-[90%] flex flex-col overflow-y-auto">

            <div class="flex justify-between items-center border-b border-slate-100 pb-3">

                <h3 class="font-black text-lg text-slate-800 flex items-center gap-2">
                    🏧 Bankomat €
                </h3>

                <button onclick="hideAtm()"
                        class="text-slate-400 hover:text-slate-600 font-bold text-xl p-1">
                    ✕
                </button>

            </div>

            <div class="space-y-4">

                <div>

                    <label class="block text-xs font-bold text-slate-500 mb-1">
                        Rodzaj operacji
                    </label>

                    <select id="atm-direction"
                            class="w-full p-3.5 rounded-xl bg-slate-50 border border-slate-200 font-bold text-sm text-slate-700 focus:outline-none">

                        <option value="deposit">💵 Wpłać</option>
                        <option value="withdraw">💸 Wypłać</option>

                    </select>

                </div>

                <div>

                    <label class="block text-xs font-bold text-slate-500 mb-1">
                        Kwota (€)
                    </label>

                    <input type="number"
                           id="atm-value-input"
                           placeholder="0.00"
                           class="w-full p-3.5 rounded-xl bg-slate-50 border border-slate-200 font-black text-center text-2xl text-slate-800 focus:outline-none">

                </div>

                <!-- NOWE POLE -->

                <div>

                    <label class="block text-xs font-bold text-slate-500 mb-1">
                        Opis wypłaty (opcjonalnie)
                    </label>

                    <input type="text"
                           id="atm-note-input"
                           placeholder="np. jedzenie, doładowanie, zakupy..."
                           class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 text-sm text-slate-700 focus:outline-none">

                </div>

                <button onclick="startAtmAnimationRoutine()"
                        class="w-full bg-gradient-to-r from-cyan-400 to-emerald-500 text-white font-black py-4 rounded-xl transition shadow-xl uppercase tracking-wider text-xs cursor-pointer">

                    Zatwierdź ⚡

                </button>

            </div>

        </div>

    </div>

</div>

<script>

let loggedUserSession = '';

let mainStorage = {
    balance: 0,
    goals: [],
    history: []
};

function saveToLocalStorage() {
    localStorage.setItem(
        'babel_gospodarstwo_data',
        JSON.stringify(mainStorage)
    );
}

function loadFromLocalStorage() {

    const data =
        localStorage.getItem('babel_gospodarstwo_data');

    if(data) {
        mainStorage = JSON.parse(data);
    }

    const session =
        localStorage.getItem('babel_user_session');

    if(session) {
        loggedUserSession = session;
        setupLoggedInUI();
    }
}

function executeAuth(e) {

    e.preventDefault();

    loggedUserSession =
        document.getElementById('user-email').value;

    localStorage.setItem(
        'babel_user_session',
        loggedUserSession
    );

    setupLoggedInUI();
}

function setupLoggedInUI() {

    document.getElementById('auth-panel')
        .classList.add('hidden');

    document.getElementById('menu-trigger')
        .classList.remove('hidden');

    document.getElementById('logout-trigger')
        .classList.remove('hidden');

    document.getElementById('sidebar-user')
        .innerText = loggedUserSession;

    switchView('main');
}

function runLogout() {

    localStorage.removeItem('babel_user_session');
    localStorage.removeItem('babel_gospodarstwo_data');

    location.reload();
}

function toggleSidebar(open) {

    const menu =
        document.getElementById('sidebar-menu');

    const overlay =
        document.getElementById('sidebar-overlay');

    if(open) {

        menu.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');

    } else {

        menu.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }
}

function switchView(viewName) {

    document.getElementById('view-main')
        .classList.add('hidden');

    document.getElementById('view-history')
        .classList.add('hidden');

    if(viewName === 'main') {

        document.getElementById('view-main')
            .classList.remove('hidden');

        renderSystemDashboard();
    }

    if(viewName === 'history') {

        document.getElementById('view-history')
            .classList.remove('hidden');

        renderHistory();
    }

    toggleSidebar(false);
}

function renderSystemDashboard() {

    document.getElementById('display-balance')
        .innerText = mainStorage.balance.toFixed(2);

    const box =
        document.getElementById('goals-list-box');

    box.innerHTML = '';

    if(mainStorage.goals.length === 0) {

        box.innerHTML = `
            <div class="text-center py-10 text-slate-400 text-xs italic bg-white rounded-2xl border border-dashed border-slate-200">
                Brak celów.
            </div>
        `;

        return;
    }
}

function launchAtm() {

    document.getElementById('atm-modal')
        .classList.remove('hidden');
}

function hideAtm() {

    document.getElementById('atm-modal')
        .classList.add('hidden');
}

function startAtmAnimationRoutine() {

    const mode =
        document.getElementById('atm-direction').value;

    const cashAmount =
        parseFloat(
            document.getElementById('atm-value-input').value
        );

    const noteValue =
        document.getElementById('atm-note-input').value.trim();

    if(isNaN(cashAmount) || cashAmount <= 0) {

        alert('Wpisz poprawną kwotę!');
        return;
    }

    if(
        mode === 'withdraw' &&
        cashAmount > mainStorage.balance
    ) {

        alert('Brak środków!');
        return;
    }

    const now = new Date();

    const timeStr =
        now.toLocaleString([], {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });

    setTimeout(() => {

        if(mode === 'deposit') {

            mainStorage.balance += cashAmount;

            mainStorage.history.unshift({
                type: 'Wpłata',
                amount: cashAmount,
                date: timeStr,
                note: ''
            });

        } else {

            mainStorage.balance -= cashAmount;

            mainStorage.history.unshift({
                type: 'Wypłata',
                amount: cashAmount,
                date: timeStr,
                note: noteValue
            });
        }

        document.getElementById('atm-value-input').value = '';
        document.getElementById('atm-note-input').value = '';

        saveToLocalStorage();

        renderSystemDashboard();

        hideAtm();

    }, 900);
}

function renderHistory() {

    const hList =
        document.getElementById('history-list');

    hList.innerHTML = '';

    if(mainStorage.history.length === 0) {

        hList.innerHTML = `
            <p class="text-center py-10 text-slate-400 text-xs italic">
                Brak historii.
            </p>
        `;

        return;
    }

    mainStorage.history.forEach(item => {

        const row = document.createElement('div');

        row.className =
            `p-3 bg-white border border-slate-100 rounded-xl flex justify-between items-center text-xs shadow-sm`;

        row.innerHTML = `

            <div class="flex-1">

                <p class="font-bold text-slate-700">
                    ${item.type}
                </p>

                <p class="text-[9px] font-mono text-slate-400">
                    ${item.date}
                </p>

                ${
                    item.note
                    ? `
                        <p class="text-[10px] text-cyan-600 font-semibold mt-1">
                            📝 Opis: ${item.note}
                        </p>
                    `
                    : ''
                }

            </div>

            <span class="${
                item.type === 'Wpłata'
                    ? 'text-emerald-600 font-bold'
                    : 'text-red-500 font-bold'
            }">

                ${
                    item.type === 'Wpłata'
                        ? '+'
                        : '-'
                }

                ${item.amount.toFixed(2)} €

            </span>

        `;

        hList.appendChild(row);
    });
}

window.onload = function() {

    loadFromLocalStorage();
};

</script>

</body>
</html>
